<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>synapseclean</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="brand-surface popup-body">
  <div class="popup-shell">
    <header class="popup-header">
      <img src="../assets/logo128.png" alt="SynapseClean" class="brand-mark">
      <div>
        <h1>SynapseClean</h1>
        <p>Local prompt compactor</p>
      </div>
      <div id="status-pill" class="status-pill active">Active</div>
    </header>

    <section class="metric-grid">
      <article class="metric-card">
        <span class="metric-label">Compactions</span>
        <strong id="metric-compactions">0</strong>
      </article>
      <article class="metric-card accent">
        <span class="metric-label">Chars saved</span>
        <strong id="metric-saved">0</strong>
      </article>
    </section>

    <section class="panel">
      <div class="panel-row">
        <span>Protection</span>
        <label class="switch">
          <input id="toggle-enabled" type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="panel-row">
        <span>Auto-compact on copy</span>
        <label class="switch">
          <input id="toggle-auto-copy" type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="panel-row">
        <span>Engine</span>
        <span id="engine-status" class="badge ready">Rules</span>
      </div>
      <div class="panel-row gemini-row hidden" id="gemini-status-block">
        <span>Gemini Nano</span>
        <span id="gemini-status" class="badge gemini-checking">Checking…</span>
      </div>
      <p id="gemini-hint" class="hint gemini-hint hidden"></p>
      <p class="hint">Select text → Copy, or press <kbd data-compact-shortcut>Alt+Shift+C</kbd></p>
    </section>

    <section class="panel">
      <h2>Recent Compactions</h2>
      <ul id="recent-list" class="recent-list">
        <li class="empty">No compactions recorded yet.</li>
      </ul>
    </section>

    <footer class="popup-footer">
      <button id="open-options" class="btn-secondary">Prompt Console</button>
      <a id="kofi-link" class="kofi-btn" href="https://ko-fi.com/D6M821E6GR" target="_blank" rel="noopener noreferrer">
        <span class="kofi-icon" aria-hidden="true">☕</span>
        Support me on Ko-fi
      </a>
    </footer>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
